<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS-система</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Боковое меню -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <i class="bi bi-shop"></i>
    <span class="brand-text">POS-система</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/cashier" class="nav-item {% if request.path == '/cashier' %}active{% endif %}">
      <i class="bi bi-cart3"></i><span>Касса</span>
    </a>
    <a href="/sales-history" class="nav-item {% if request.path == '/sales-history' %}active{% endif %}">
      <i class="bi bi-receipt"></i><span>Чеки</span>
    </a>
    {% if session.get('role') == 'admin' %}
    <div class="nav-section">Товары и склад</div>
    <a href="/products" class="nav-item {% if request.path == '/products' %}active{% endif %}">
      <i class="bi bi-box-seam"></i><span>Товары</span>
    </a>
    <a href="/categories" class="nav-item {% if request.path == '/categories' %}active{% endif %}">
      <i class="bi bi-tags"></i><span>Категории</span>
    </a>
    <a href="/inventory" class="nav-item {% if request.path == '/inventory' %}active{% endif %}">
      <i class="bi bi-truck"></i><span>Приход/Списание</span>
    </a>
    <div class="nav-section">Управление</div>
    <a href="/reports" class="nav-item {% if request.path == '/reports' %}active{% endif %}">
      <i class="bi bi-bar-chart-line"></i><span>Отчёты</span>
    </a>
    <a href="/users" class="nav-item {% if request.path == '/users' %}active{% endif %}">
      <i class="bi bi-people"></i><span>Пользователи</span>
    </a>
    <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
      <i class="bi bi-gear"></i><span>Настройки</span>
    </a>
    {% endif %}
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <i class="bi bi-person-circle"></i>
      <div>
        <div class="user-name" id="sidebar-username">Загрузка...</div>
        <div class="user-role" id="sidebar-role"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
  </div>
</div>

<!-- Основной контент -->
<div class="main-content">
  <!-- Шапка -->
  <header class="topbar">
    <button class="btn-menu-toggle" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <div class="topbar-center">
      <span id="topbar-datetime"></span>
    </div>
    <div class="shift-status" id="shift-status">
      <span class="badge bg-secondary">Смена не открыта</span>
    </div>
  </header>

  <!-- Контент страницы -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Toast-уведомления -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<!-- Модальное окно -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="confirmTitle">Подтверждение</h5>
      </div>
      <div class="modal-body" id="confirmBody">Вы уверены?</div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="button" class="btn btn-danger" id="confirmOkBtn">Удалить</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
